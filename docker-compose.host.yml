# Host-network override for real PLC deployments.
# Usage: docker compose -f docker-compose.yml -f docker-compose.host.yml up -d
#
# Applies network_mode: host to the backend so UDP packets from the
# ABB AC500 PLC reach the listener sockets. Bridge networking silently
# drops inbound PLC frames — this override is REQUIRED for any
# deployment attached to a real PLC.
#
# When combined with docker-compose.prod.yml (GHCR images + watchtower)
# and docker-compose.https.yml (nginx TLS termination):
#   docker compose -f docker-compose.yml \
#     -f docker-compose.host.yml \
#     -f docker-compose.https.yml \
#     -f docker-compose.prod.yml up -d

services:
  backend:
    network_mode: host
    ports: !override []
    environment:
      # Host networking means Docker DNS doesn't resolve service names.
      # Backend reaches DB and Mosquitto via loopback.
      PG_HOST: 127.0.0.1
      MQTT_HOST: 127.0.0.1
