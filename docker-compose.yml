services:
  db:
    image: timescale/timescaledb:latest-pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wpt
      POSTGRES_USER: wpt
      POSTGRES_PASSWORD: ${PG_PASSWORD:-wpt_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-timescaledb.sql:/docker-entrypoint-initdb.d/010-timescaledb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpt"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "pidof mosquitto || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =====================================================================
  # ⚠ UDP NETWORKING WARNING — READ BEFORE DEPLOYING WITH A REAL PLC ⚠
  # =====================================================================
  # This base compose uses Docker bridge networking + explicit UDP port
  # mappings (9090-9093/udp). That WILL silently drop inbound packets
  # from a real ABB AC500 PLC.
  #
  # For ANY deployment attached to a real PLC, layer the host override:
  #   docker compose -f docker-compose.yml -f docker-compose.host.yml up -d
  #
  # docker-compose.host.yml applies network_mode: host and clears ports,
  # which is the only configuration that lets PLC UDP frames reach the
  # listener sockets. Do not "simplify" this requirement away.
  # =====================================================================
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
      - "9090:9090/udp"
      - "9091:9091/udp"
      - "9092:9092/udp"
      - "9093:9093/udp"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_DB: wpt
      PG_USERNAME: wpt
      PG_PASSWORD: ${PG_PASSWORD:-wpt_dev_password}
      PORT: 3000
      HOST: 0.0.0.0
      UDP_PORT_DATA: 9090
      UDP_PORT_ALARMS: 9091
      UDP_PORT_USERS: 9092
      UDP_PORT_ACK: 9093
      # Legacy SIM_* names kept for config.ts compatibility — these are
      # the PLC-side ports the backend sends control messages / writes to.
      # The target host is read from the DB-backed plc_config table,
      # not from env.
      SIM_ACK_PORT: 9093
      SIM_DATA_PORT: 9090
      SIM_USERS_PORT: 9092
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-session-secret-minimum-32-chars!!}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-wpt-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-wpt_mqtt_dev_password}
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_SITE_ID: ${MQTT_SITE_ID:-site-01}
      MQTT_MACHINE_ID: ${MQTT_MACHINE_ID:-wpt40-001}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* is BAKED into the Next.js client bundle at build
        # time, NOT read at runtime. Override via .env (NEXT_PUBLIC_API_URL=...)
        # before `docker compose build frontend` to point a LAN deploy at
        # the right host. Default localhost is for the on-host dev case.
        # See scripts/install-linux.sh for the LAN-IP overlay generator.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  uploads:
  mosquitto_data:
  mosquitto_log:
