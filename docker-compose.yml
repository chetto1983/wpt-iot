# Single-file production+dev stack. Ship as-is on Linux (bench / customer edge).
# Windows/macOS dev runs backend locally (host networking is Linux-only) and
# only the db service here.
#
# Merged in Phase 37.3: former docker-compose.host.yml, docker-compose.https.yml,
# docker-compose.prod.yml are deleted. network_mode: host on backend is the
# default — PLC UDP requires it and there is no bench/prod scenario where
# bridge networking is correct.

services:
  db:
    image: timescale/timescaledb:latest-pg17
    # Loopback-only binding. Backend reaches the DB via 127.0.0.1 because
    # it runs on the host network; nothing on the LAN should touch pg.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: wpt
      POSTGRES_USER: wpt
      POSTGRES_PASSWORD: ${PG_PASSWORD:-wpt_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-timescaledb.sql:/docker-entrypoint-initdb.d/010-timescaledb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpt"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # TEMPORARY — the local Mosquitto broker is present for the internal
  # pub/sub bus while the cloud uplink via Sparkplug B is not yet the
  # shipping path. In production with the remote MQTT broker over GSM the
  # local broker is removed entirely. Do not build new features that assume
  # a local broker exists.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    # Exposed on all interfaces for external MQTT test clients (mqtt-explorer,
    # Sparkplug B listener on laptops). Production ships without this service
    # entirely — cloud uplink replaces the local broker.
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "pidof mosquitto || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # backend runs on the host network so PLC UDP frames (9090-9093) reach the
  # listener sockets. Bridge networking silently drops them. Host mode also
  # means Docker DNS doesn't resolve service names — the backend uses
  # 127.0.0.1 for db and mosquitto (both are bound to loopback above).
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_DB: wpt
      PG_USERNAME: wpt
      PG_PASSWORD: ${PG_PASSWORD:-wpt_dev_password}
      PORT: 3000
      HOST: 0.0.0.0
      UDP_PORT_DATA: 9090
      UDP_PORT_ALARMS: 9091
      UDP_PORT_USERS: 9092
      UDP_PORT_ACK: 9093
      # Legacy SIM_* names kept for config.ts compatibility — these are
      # the PLC-side ports the backend sends control messages / writes to.
      # The target host is read from the DB-backed plc_config table,
      # not from env.
      SIM_ACK_PORT: 9093
      SIM_DATA_PORT: 9090
      SIM_USERS_PORT: 9092
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-session-secret-minimum-32-chars!!}
      # AES-256-GCM key for mqtt_config.password (and future secrets) at rest.
      # MUST be set in .env on every deployment; MUST be identical across reboots.
      # Losing this value makes encrypted secrets unrecoverable.
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      MQTT_HOST: ${MQTT_HOST:-127.0.0.1}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-wpt-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-wpt_mqtt_dev_password}
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_SITE_ID: ${MQTT_SITE_ID:-site-01}
      MQTT_MACHINE_ID: ${MQTT_MACHINE_ID:-wpt40-001}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Phase 37.3: same-origin architecture. NEXT_PUBLIC_API_URL defaults
        # empty so the Next.js bundle uses relative URLs — nginx (prod) and
        # Next dev rewrites (dev) route /api/* to the backend on the same
        # origin. The image is IP- and hostname-agnostic: rename the device
        # or change LAN IP without rebuild. Override only for the rare case
        # where the backend lives on a different origin than the frontend.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    # No external port binding — nginx below proxies the frontend on 443.
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # TLS terminator + same-origin router. All browser traffic lands here;
  # /api/* and /uploads/* go to the backend (on the host network via
  # host.docker.internal), everything else to the frontend.
  nginx:
    image: nginx:1.28.3-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOLLAR: "$"
      FRONTEND_SERVER_NAME: ${WPT_FRONTEND_HOST:-wpt.local}
      FRONTEND_UPSTREAM: frontend:3001
      BACKEND_UPSTREAM: host.docker.internal:${PORT:-3000}
      TLS_CERT_PATH: /etc/nginx/certs/server.crt
      TLS_KEY_PATH: /etc/nginx/certs/server.key
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ${WPT_TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  uploads:
  mosquitto_data:
  mosquitto_log:
