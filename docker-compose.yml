services:
  db:
    image: timescale/timescaledb:latest-pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wpt
      POSTGRES_USER: wpt
      POSTGRES_PASSWORD: ${PG_PASSWORD:-wpt_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-timescaledb.sql:/docker-entrypoint-initdb.d/010-timescaledb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpt"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "pidof mosquitto || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =====================================================================
  # ⚠ UDP NETWORKING WARNING — READ BEFORE DEPLOYING WITH A REAL PLC ⚠
  # =====================================================================
  # This base compose uses Docker bridge networking + explicit UDP port
  # mappings (9090-9093/udp). That works for the dev simulator stack
  # (simulator → backend over the bridge network) but it WILL silently
  # drop inbound packets from a real ABB AC500 PLC.
  #
  # CLAUDE.md mandate (non-negotiable):
  #   "Backend networking: Must use network_mode: host in Docker —
  #    bridge networking kills UDP PLC packets"
  #
  # For ANY deployment attached to a real PLC, you MUST layer the
  # production override on top of this file:
  #
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
  #
  # The prod override (docker-compose.prod.yml) applies
  # `network_mode: host` and clears `ports: []` on the backend service,
  # which is the only configuration that lets the PLC's UDP frames
  # actually reach the listener sockets.
  #
  # If you are extending this file with a new "real-plc" profile or
  # reorganising deployments, the network_mode: host requirement
  # carries over — do not "simplify" it away.
  # =====================================================================
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
      - "9090:9090/udp"
      - "9091:9091/udp"
      - "9092:9092/udp"
      - "9093:9093/udp"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_DB: wpt
      PG_USERNAME: wpt
      PG_PASSWORD: ${PG_PASSWORD:-wpt_dev_password}
      PORT: 3000
      HOST: 0.0.0.0
      UDP_PORT_DATA: 9090
      UDP_PORT_ALARMS: 9091
      UDP_PORT_USERS: 9092
      UDP_PORT_ACK: 9093
      SIM_HOST: ${SIM_HOST:-simulator}
      SIM_ACK_PORT: 9093
      SIM_DATA_PORT: 9090
      SIM_USERS_PORT: 9092
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-session-secret-minimum-32-chars!!}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-wpt-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-wpt_mqtt_dev_password}
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_SITE_ID: ${MQTT_SITE_ID:-site-01}
      MQTT_MACHINE_ID: ${MQTT_MACHINE_ID:-wpt40-001}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Simulator runs on a dedicated bridge network with a STATIC IP so the
  # backend (host network mode in prod/host overrides) can reach it as a
  # drop-in PLC replacement: just point plc_config.target_host at
  # 172.28.0.10 to use the simulator, or at the real PLC IP to use the
  # real PLC. No env-var or port changes needed when switching.
  #
  # The dedicated network avoids pinning IPs on wpt-iot_default and keeps
  # the simulator routable from the host kernel via its own br-xxx
  # interface (host → 172.28.0.0/24 → simulator container).
  simulator:
    build:
      context: .
      dockerfile: apps/simulator/Dockerfile
    profiles: ["dev"]
    ports:
      - "3002:3002"
      - "19090:9090/udp"
      - "19091:9091/udp"
      - "19092:9092/udp"
      - "19093:9093/udp"
    environment:
      SIM_PORT: 3002
      TARGET_HOST: backend
      TARGET_DATA_PORT: 9090
      TARGET_ALARMS_PORT: 9091
      UDP_LISTEN_DATA: 9090
      UDP_LISTEN_ALARMS: 9091
      UDP_LISTEN_USERS: 9092
      UDP_LISTEN_ACK: 9093
      DATA_INTERVAL_MS: 15000
      ALARM_INTERVAL_MS: 1000
      STATE_FILE_PATH: /app/data/simulator-state.json
    volumes:
      - simulator-data:/app/data
    networks:
      wpt-sim:
        ipv4_address: 172.28.0.10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  uploads:
  mosquitto_data:
  mosquitto_log:
  simulator-data:

networks:
  # Dedicated bridge network for the dev simulator. Fixed subnet so the
  # static IP 172.28.0.10 (assigned to the simulator service) is stable
  # across recreations and can be hardcoded in plc_config when the
  # operator switches between simulator and real PLC modes.
  wpt-sim:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
