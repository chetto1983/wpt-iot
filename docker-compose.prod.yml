# Production override: pull pre-built images from GHCR instead of building locally.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires:
#   1. GHCR auth: docker login ghcr.io -u USERNAME --password-stdin < PAT
#   2. Production .env file with overrides (see .env.example)
#   3. avahi-daemon configured on host (see scripts/setup-onlogic.sh)

services:
  backend:
    image: ghcr.io/chetto1983/wpt-backend:latest
    pull_policy: always
    network_mode: host
    ports: []
    # Host networking + 0.0.0.0->127.0.0.1 mosquitto bind = backend reaches broker via loopback,
    # NOT via the "mosquitto" Docker DNS name (which is not in scope under network_mode: host).
    # CORS_ORIGIN must be the LAN-facing frontend URL; default in base compose is localhost which
    # only works for dev on the OnLogic itself.
    environment:
      MQTT_HOST: 127.0.0.1
      CORS_ORIGIN: ${CORS_ORIGIN:-http://wpt.local:3001}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    # Lock PostgreSQL to host loopback in prod. Backend (network_mode: host) reaches it via
    # 127.0.0.1:5432; nothing else on the OnLogic LAN should be able to talk to the DB directly.
    # !override replaces the base "5432:5432" (0.0.0.0) binding entirely — without it, Compose
    # would append and BOTH bindings would be active, defeating the loopback clamp.
    ports: !override
      - "127.0.0.1:5432:5432"

  mosquitto:
    # Lock MQTT broker (TCP 1883 + WebSocket 9001) to host loopback in prod. Backend reaches it
    # via 127.0.0.1; LAN MQTT clients are out of scope until TLS is added (separate decision).
    # !override replaces the base "1883:1883" + "9001:9001" (0.0.0.0) bindings entirely — see db comment.
    ports: !override
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"

  frontend:
    image: ghcr.io/chetto1983/wpt-frontend:latest
    pull_policy: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: nickfedor/watchtower:1.14.2
    container_name: watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_LOG_LEVEL: info
      DOCKER_CONFIG: /config
      TZ: Europe/Rome
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/watchtower/config/:/config/
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
